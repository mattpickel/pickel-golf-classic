services:
  - type: web
    name: pickel-golf-classic-api
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: WEBHOOK_SECRET
        sync: false
      - key: DB_PATH
        value: /opt/render/project/src/data
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
